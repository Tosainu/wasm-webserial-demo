name: Build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - &actions-setup-node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.8.1
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5.0.4
        id: cache-cargo
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-${{ github.job }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo install --git https://github.com/wasm-bindgen/wasm-pack.git --rev 7d37f38b5c4db90618a0e108029e5863a4c7ce43 # v0.14.0
        if: steps.cache-cargo.outputs.cache-hit != 'true'
      - run: wasm-pack build --target web
      - run: pnpm vite build
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: &build-artifact-name dist
          path: dist

  prettier:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - *actions-setup-node
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --check .

  cargo-fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - run: cargo fmt --check

  cargo-clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - run: cargo clippy -- -D warnings

  deploy:
    runs-on: ubuntu-slim
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: *build-artifact-name
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: .
      - uses: actions/deploy-pages@v5.0.0
        id: deployment
